---
virtualmachines:
  - name: "rhel"
    image: "rhel-10-0-07-09-25-3"
    bootloader: efi
    memory: "4G"
    cores: 1
    image_size: "40G"
    tags:
      - key: "AnsibleGroup"
        value: "bastions"
    networks:
      - default
    packages:
      - podman
      - nano
      - git
      - jq
    services:
      - name: registry-http
        ports:
          - port: 80
            protocol: TCP
            targetPort: 80
            name: registry-http
      - name: registry
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: registry
    routes:
      - name: registry-http
        host: registry
        service: registry-http
        targetPort: 80
        tls: false
        path: "/.well-known/"
      - name: registry
        host: registry
        service: registry
        targetPort: 443
        tls: true
        tls_termination: Edge
